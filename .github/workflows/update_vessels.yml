name: Maritime Intelligence Worker

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:          # manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger maritime news refresh
        run: |
          echo "Triggering fetch-maritime-news edge function..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            '${{ secrets.SUPABASE_EDGE_URL }}/functions/v1/fetch-maritime-news' \
            -H 'Content-Type: application/json' \
            --max-time 60)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "HTTP $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: edge function returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "SUCCESS" && echo $BODY | python3 -m json.tool
