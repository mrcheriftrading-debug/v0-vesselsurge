name: Maritime Intelligence Worker

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours č stays within newsdata.io free tier (200 credits/day)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger maritime news refresh
        run: |
          EDGE_URL="https://zcfumevusbcdinbwtnev.supabase.co/functions/v1/fetch-maritime-news"
          echo "Calling: $EDGE_URL"
          RESPONSE=$(curl -s -o /tmp/body.txt -w "%{http_code}" -X POST "$EDGE_URL" \
            -H 'Content-Type: application/json' \
            --max-time 90)
          BODY=$(cat /tmp/body.txt)
          echo "HTTP $RESPONSE"
          echo "Response: $BODY"
          if [ "$RESPONSE" != "200" ]; then
            echo "ERROR: HTTP $RESPONSE"
            exit 1
          fi
          echo "SUCCESS"
